<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>认读模式 - 学习模块</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-bright": "#f7f9fc",
                  "outline-variant": "#c1c7d3",
                  "tertiary-container": "#a06900",
                  "secondary-fixed": "#6bfad8",
                  "background": "#f7f9fc",
                  "surface-container-highest": "#e0e3e6",
                  "on-secondary": "#ffffff",
                  "surface-container-lowest": "#ffffff",
                  "on-tertiary-fixed": "#291800",
                  "on-primary-fixed": "#001c39",
                  "secondary": "#006b58",
                  "outline": "#717783",
                  "surface-container-low": "#f2f4f7",
                  "surface-container-high": "#e6e8eb",
                  "primary": "#005da7",
                  "inverse-surface": "#2d3133",
                  "on-tertiary": "#ffffff",
                  "surface-dim": "#d8dadd",
                  "on-surface": "#191c1e",
                  "on-surface-variant": "#414751",
                  "tertiary": "#7f5300",
                  "on-tertiary-fixed-variant": "#633f00",
                  "on-error-container": "#93000a",
                  "on-secondary-fixed-variant": "#005142",
                  "secondary-container": "#67f7d5",
                  "primary-fixed-dim": "#a4c9ff",
                  "on-primary-container": "#fdfcff",
                  "error": "#ba1a1a",
                  "inverse-primary": "#a4c9ff",
                  "on-primary": "#ffffff",
                  "error-container": "#ffdad6",
                  "secondary-fixed-dim": "#48ddbc",
                  "surface-variant": "#e0e3e6",
                  "tertiary-fixed": "#ffddb4",
                  "surface-container": "#eceef1",
                  "on-secondary-container": "#00705c",
                  "on-tertiary-container": "#fffbff",
                  "surface-tint": "#0060ac",
                  "surface": "#f7f9fc",
                  "on-primary-fixed-variant": "#004883",
                  "inverse-on-surface": "#eff1f4",
                  "on-secondary-fixed": "#002019",
                  "on-error": "#ffffff",
                  "primary-container": "#2976c7",
                  "primary-fixed": "#d4e3ff",
                  "tertiary-fixed-dim": "#ffb953",
                  "on-background": "#191c1e"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "stack-gap": "16px",
                  "container-padding": "20px",
                  "inline-gap": "12px",
                  "section-margin": "32px"
          },
          "fontFamily": {
                  "headline-md": ["Plus Jakarta Sans"],
                  "headline-lg": ["Plus Jakarta Sans"],
                  "body-md": ["Be Vietnam Pro"],
                  "display-lg": ["Plus Jakarta Sans"],
                  "body-lg": ["Be Vietnam Pro"],
                  "label-md": ["Be Vietnam Pro"]
          },
          "fontSize": {
                  "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                  "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                  "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                  "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #f7f9fc;
      -webkit-tap-highlight-color: transparent;
      min-height: 100dvh;
    }
    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body class="font-body-md text-on-surface">
<!-- Top Navigation Bar -->
<header class="bg-surface fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-16">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-semibold">认读模式</h1>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary">more_vert</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 pb-48 min-h-screen px-container-padding flex flex-col gap-stack-gap">
<!-- Progress Indicator -->
<div class="flex flex-col gap-2 mt-4">
<div class="flex justify-between items-end mb-1">
<span class="font-label-md text-label-md text-on-surface-variant">当前进度</span>
<span class="font-headline-md text-headline-md text-primary">5 <span class="text-on-surface-variant font-body-md">/ 20</span></span>
</div>
<div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-secondary-fixed-dim rounded-full transition-all duration-500" style="width: 25%;"></div>
</div>
</div>
<!-- Word Recognition Card -->
<div class="mt-4 flex-grow flex flex-col items-center justify-start">
<div class="w-full bg-surface-container-lowest rounded-xl border border-outline-variant p-6 shadow-sm flex flex-col items-center gap-6 min-h-[360px] transition-all hover:shadow-lg">
<!-- Word Header -->
<div class="flex flex-col gap-2 text-center">
<h2 class="font-display-lg text-display-lg text-on-surface tracking-tight">Friendship</h2>
<span class="font-body-lg text-body-lg text-outline italic">/ˈfrend.ʃɪp/</span>
</div>
<!-- Speaker Button -->
<button class="w-16 h-16 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shadow-md active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[32px]">volume_up</span>
</button>
<!-- Word Definition Section (Focused/Appeared) -->
<div class="mt-2 pt-6 border-t border-outline-variant w-full">
<div class="flex items-center gap-2 mb-3">
<span class="w-1 h-5 bg-primary rounded-full"></span>
<span class="font-headline-md text-on-surface font-semibold">词义</span>
</div>
<div class="space-y-2">
<p class="font-headline-lg text-headline-lg text-secondary">友谊</p>
<p class="font-body-md text-body-md text-on-surface-variant">n. 友谊，友情，友好关系</p>
</div>
</div>
<!-- Related Learning Triggers (Based on logic diagram) -->
<div class="w-full grid grid-cols-2 gap-3 mt-4">
<button class="flex items-center justify-center gap-2 py-3 rounded-lg bg-surface-container-low border border-outline-variant text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]">phonetics</span>
<span class="text-[13px] font-medium">音标课程</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 rounded-lg bg-surface-container-low border border-outline-variant text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]">library_books</span>
<span class="text-[13px] font-medium">词组库</span>
</button>
</div>
</div>
</div>
<!-- Tips/Instruction Area -->
<div class="flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]">info</span>
<p class="font-label-md text-label-md">查看词义后，请根据记忆情况选择</p>
</div>
</main>
<!-- Immersive Floating Action Area -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest px-container-padding pt-6 pb-8 rounded-t-xl shadow-[0_-4px_24px_rgba(0,0,0,0.05)] border-t border-outline-variant z-50">
<div class="max-w-md mx-auto flex flex-col gap-4">
<!-- Primary Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="flex-1 h-14 rounded-xl border-2 border-outline-variant text-on-surface-variant font-headline-md text-headline-md flex items-center justify-center active:scale-95 transition-all">
          模糊 / 不确定
        </button>
<button class="flex-1 h-14 rounded-xl bg-gradient-to-r from-primary to-primary-container text-white font-headline-md text-headline-md flex items-center justify-center shadow-lg active:scale-95 transition-all">
          认识
        </button>
</div>
<!-- Quick Context Info -->
<div class="flex justify-center items-center gap-6 pt-2">
<div class="flex items-center gap-1.5 opacity-60">
<span class="material-symbols-outlined text-[16px]">history</span>
<span class="text-[12px] font-label-md">上次记忆：3天前</span>
</div>
<div class="flex items-center gap-1.5 opacity-60">
<span class="material-symbols-outlined text-[16px]">trending_up</span>
<span class="text-[12px] font-label-md">掌握度：25%</span>
</div>
</div>
</div>
<div class="safe-bottom"></div>
</footer>
<!-- Background Decorative Element -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[10%] right-[-5%] w-64 h-64 rounded-full bg-secondary-fixed opacity-10 blur-3xl"></div>
<div class="absolute bottom-[20%] left-[-10%] w-80 h-80 rounded-full bg-primary-fixed opacity-10 blur-3xl"></div>
</div>
</body></html>
