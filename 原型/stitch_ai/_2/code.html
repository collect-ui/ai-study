<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>AI 学习助手 - 登录与测评</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

                        "error-container": "#ffdad6",

                        "background": "#f7f9fc",
                        "on-secondary-fixed": "#002019",
                        "inverse-primary": "#a4c9ff",
                        "inverse-on-surface": "#eff1f4",
                        "surface-tint": "#0060ac",
                        "error": "#ba1a1a",
                        "primary-fixed": "#d4e3ff",
                        "inverse-surface": "#2d3133",
                        "tertiary": "#7f5300",
                        "tertiary-container": "#a06900",

                        "surface-container-high": "#e6e8eb",

                        "on-secondary-fixed-variant": "#005142",
                        "surface-variant": "#e0e3e6",
                        "on-surface": "#191c1e",
                        "on-secondary-container": "#00705c",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-margin": "32px",
                        "container-padding": "20px",
                        "stack-gap": "16px",
                        "inline-gap": "12px"
                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],

                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f9fc;
            -webkit-font-smoothing: antialiased;
        }
        .custom-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .custom-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface">
<!-- Top AppBar (From Shared Components) -->
<header class="bg-surface dark:bg-surface-dim flex justify-between items-center w-full px-container-padding h-16 sticky top-0 z-40">
<div class="flex items-center gap-inline-gap">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="school">school</span>
<span class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">AI 学习助手</span>
</div>
<button class="hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors p-2 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" data-icon="notifications">notifications</span>
</button>
</header>
<main class="max-w-md mx-auto px-container-padding pb-32">
<!-- Login Section -->
<section class="mt-section-margin bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/30">
<h2 class="font-headline-md text-headline-md text-on-surface mb-6">欢迎回来</h2>
<div class="space-y-4">
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 text-body-lg font-body-lg focus:ring-2 focus:ring-primary/20 placeholder:text-outline/60" placeholder="请输入手机号" type="tel">
</div>
<div class="flex gap-3">
<input class="flex-1 bg-surface-container-low border-none rounded-xl px-4 py-3 text-body-lg font-body-lg focus:ring-2 focus:ring-primary/20 placeholder:text-outline/60" placeholder="短信验证码" type="text">
<button class="px-4 py-2 text-primary font-label-md text-label-md bg-primary-fixed hover:bg-primary-fixed-dim rounded-xl transition-colors">获取验证码</button>
</div>
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-3 rounded-xl hover:opacity-90 active:scale-[0.98] transition-all">登录</button>
<div class="text-center">
<a class="text-outline text-label-md font-label-md hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">暂不登录，以游客身份继续</a>
</div>
</div>
</section>
<!-- Assessment Section -->
<section class="mt-section-margin">
<div class="flex items-center justify-between mb-stack-gap">
<h2 class="font-headline-md text-headline-md text-on-surface">开始单次测评</h2>
<span class="text-label-md font-label-md px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full">AI 智能分析</span>
</div>
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/30 space-y-8">
<!-- School Stage Segmented Control -->
<div>
<label class="text-label-md font-label-md text-outline block mb-3">学段选择</label>
<div class="flex bg-surface-container-low p-1 rounded-xl">
<button class="flex-1 py-2 rounded-lg bg-surface-container-lowest text-primary shadow-sm font-body-md text-body-md">小学</button>
<button class="flex-1 py-2 rounded-lg text-on-surface-variant font-body-md text-body-md hover:bg-surface-container-high transition-colors">初中</button>
</div>
</div>
<!-- Grade Selection Grid -->
<div>
<label class="text-label-md font-label-md text-outline block mb-3">年级</label>
<div class="grid grid-cols-3 gap-3">
<button class="py-2.5 rounded-xl border border-outline-variant text-on-surface-variant font-body-md text-body-md hover:border-primary hover:text-primary transition-colors">一年级</button>
<button class="py-2.5 rounded-xl border border-outline-variant text-on-surface-variant font-body-md text-body-md hover:border-primary hover:text-primary transition-colors">二年级</button>
<button class="py-2.5 rounded-xl border border-primary text-primary bg-primary/5 font-body-md text-body-md">三年级</button>
<button class="py-2.5 rounded-xl border border-outline-variant text-on-surface-variant font-body-md text-body-md hover:border-primary hover:text-primary transition-colors">四年级</button>
<button class="py-2.5 rounded-xl border border-outline-variant text-on-surface-variant font-body-md text-body-md hover:border-primary hover:text-primary transition-colors">五年级</button>
<button class="py-2.5 rounded-xl border border-outline-variant text-on-surface-variant font-body-md text-body-md hover:border-primary hover:text-primary transition-colors">六年级</button>
</div>
</div>
<!-- Subject Selection -->
<div>
<label class="text-label-md font-label-md text-outline block mb-3">测评科目</label>
<div class="flex gap-stack-gap overflow-x-auto custom-scrollbar">
<div class="flex-shrink-0 flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-2xl bg-primary-fixed flex items-center justify-center text-primary group-hover:scale-105 transition-transform border-2 border-primary">
<span class="material-symbols-outlined text-3xl" data-icon="menu_book">menu_book</span>
</div>
<span class="text-body-md font-body-md text-primary font-semibold">语文</span>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-2xl bg-surface-container-low flex items-center justify-center text-on-surface-variant group-hover:bg-primary-fixed/30 transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="functions">functions</span>
</div>
<span class="text-body-md font-body-md text-on-surface-variant">数学</span>
</div>
<div class="flex-shrink-0 flex flex-col items-center gap-2 group cursor-pointer">
<div class="w-16 h-16 rounded-2xl bg-surface-container-low flex items-center justify-center text-on-surface-variant group-hover:bg-primary-fixed/30 transition-colors">
<span class="material-symbols-outlined text-3xl" data-icon="translate">translate</span>
</div>
<span class="text-body-md font-body-md text-on-surface-variant">英语</span>
</div>
</div>
</div>
<!-- Decorative Card for Context -->
<div class="bg-primary/5 rounded-xl p-4 flex gap-4 items-start border border-primary/10">
<span class="material-symbols-outlined text-primary mt-1" data-icon="auto_awesome">auto_awesome</span>
<div>
<p class="font-body-md text-body-md text-on-primary-fixed-variant leading-relaxed">
                            基于当前年级进度，我们将为您准备 15 道精选题目，预计耗时 20 分钟。
                        </p>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-surface/80 backdrop-blur-md z-50">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>立即开始测评</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- Bottom Navigation (From Shared Components - Inactive Hidden for this specific task) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-container-padding pb-4 pt-2 bg-surface-container-lowest dark:bg-surface-container-low shadow-lg shadow-primary/10 rounded-t-xl sr-only">
<div class="flex flex-col items-center justify-center bg-secondary-container dark:bg-on-secondary-fixed-variant text-on-secondary-container dark:text-secondary-fixed rounded-full px-5 py-1 scale-98 transition-all duration-200">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md">首页</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:text-primary dark:hover:text-primary-fixed transition-all">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-label-md text-label-md">学习</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:text-primary dark:hover:text-primary-fixed transition-all">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-md text-label-md">报告</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-2 hover:text-primary dark:hover:text-primary-fixed transition-all">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">我的</span>
</div>
</nav>
</body></html>
