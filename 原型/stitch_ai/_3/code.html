</button>
</div>

<section class="mb-section-margin">
<div class="bg-surface-container-lowest rounded-xl p-8 text-center ai-glow border border-outline-variant/30">
<div class="relative inline-block mb-4">
<svg class="w-32 h-32 transform -rotate-90">
<circle class="text-surface-container-high" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-primary rounded-full" cx="64" cy="64" fill="transparent" r="58" stroke="currentColor" stroke-dasharray="364.4" stroke-dashoffset="54.6" stroke-width="8"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center">
<span class="font-display-lg text-display-lg text-primary">85</span>
<span class="font-label-md text-label-md text-on-surface-variant">总分</span>
</div>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2">测评结果：优秀</h2>
<div class="inline-flex items-center gap-1 bg-secondary-container text-on-secondary-container px-4 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[18px]" data-icon="trending_up">trending_up</span>

</div>
</div>
</section>

</div>

</div>
</div>
<div class="bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/30 flex items-center gap-3">

</div>
<div>

</div>

</div>

</div>
<div>

</label>

</div>
<button class="w-full bg-primary text-on-primary font-headline-md h-12 rounded-xl flex items-center justify-center mt-2 active:scale-[0.98] transition-transform" type="submit">
