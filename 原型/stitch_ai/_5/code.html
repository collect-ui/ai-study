<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>学习报告 - AI Learning System</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#291800",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#414751",
                        "on-surface": "#191c1e",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#fffbff",
                        "inverse-on-surface": "#eff1f4",
                        "outline": "#717783",
                        "surface-dim": "#d8dadd",
                        "primary-container": "#2976c7",
                        "secondary": "#006b58",
                        "on-tertiary": "#ffffff",
                        "on-background": "#191c1e",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-primary-container": "#fdfcff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "background": "#f7f9fc",
                        "primary-fixed": "#d4e3ff",
                        "surface-variant": "#e0e3e6",
                        "surface-container-high": "#e6e8eb",
                        "tertiary-fixed": "#ffddb4",
                        "primary": "#005da7",
                        "on-secondary-container": "#00705c",
                        "on-primary-fixed-variant": "#004883",
                        "secondary-fixed-dim": "#48ddbc",
                        "on-primary-fixed": "#001c39",
                        "tertiary-fixed-dim": "#ffb953",
                        "on-tertiary-fixed-variant": "#633f00",
                        "error": "#ba1a1a",
                        "surface": "#f7f9fc",
                        "error-container": "#ffdad6",
                        "surface-container": "#eceef1",
                        "tertiary-container": "#a06900",
                        "inverse-primary": "#a4c9ff",
                        "surface-tint": "#0060ac",
                        "on-secondary-fixed-variant": "#005142",
                        "surface-container-low": "#f2f4f7",
                        "surface-bright": "#f7f9fc",
                        "outline-variant": "#c1c7d3",
                        "secondary-container": "#67f7d5",
                        "on-secondary-fixed": "#002019",
                        "tertiary": "#7f5300",
                        "inverse-surface": "#2d3133",
                        "surface-container-highest": "#e0e3e6",
                        "secondary-fixed": "#6bfad8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "inline-gap": "12px",
                        "container-padding": "20px",
                        "section-margin": "32px",
                        "stack-gap": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .circular-progress {
            background: radial-gradient(closest-side, white 82%, transparent 83% 100%),
                        conic-gradient(#0060ac 92%, #e0e3e6 0);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-container-padding h-16">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary active:scale-95 transition-transform duration-200" data-icon="arrow_back">arrow_back</button>
<h1 class="text-headline-md font-headline-md font-bold text-primary">学习报告</h1>
</div>
<button class="material-symbols-outlined text-primary active:scale-95 transition-transform duration-200" data-icon="share">share</button>
</header>
<main class="flex-grow pb-32">
<!-- Score Section -->
<section class="flex flex-col items-center justify-center py-section-margin bg-white mx-container-padding rounded-xl mt-4 shadow-sm">
<div class="relative w-48 h-48 flex items-center justify-center">
<div class="circular-progress w-full h-full rounded-full absolute"></div>
<div class="relative flex flex-col items-center">
<span class="text-display-lg font-display-lg text-primary">92分</span>
<div class="mt-2 px-3 py-1 bg-secondary text-on-secondary rounded-full text-label-md font-label-md">优 Excellent</div>
</div>
</div>
<p class="mt-4 text-on-surface-variant font-body-md">太棒了！你的发音非常标准</p>
</section>
<!-- Statistics Row -->
<section class="grid grid-cols-3 gap-3 px-container-padding mt-stack-gap">
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center">
<span class="text-label-md font-label-md text-on-surface-variant mb-1">正确率</span>
<span class="text-headline-md font-headline-md text-primary">88%</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center">
<span class="text-label-md font-label-md text-on-surface-variant mb-1">学习时长</span>
<span class="text-headline-md font-headline-md text-primary">12:05</span>
</div>
<div class="bg-surface-container-low p-4 rounded-xl flex flex-col items-center">
<span class="text-label-md font-label-md text-on-surface-variant mb-1">练习句数</span>
<span class="text-headline-md font-headline-md text-primary">10句</span>
</div>
</section>
<!-- Audio Playback Control -->
<section class="px-container-padding mt-stack-gap">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl flex items-center justify-center gap-2 active:scale-98 transition-all shadow-md">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span class="font-headline-md text-headline-md">一键播放所有录音</span>
</button>
</section>
<!-- Practice List -->
<section class="mt-section-margin px-container-padding">
<h2 class="text-headline-md font-headline-md mb-4 flex items-center gap-2">
<span class="w-1 h-6 bg-primary rounded-full"></span>
                练习详情
            </h2>
<div class="space-y-3">
<!-- Item 1 -->
<div class="bg-white p-4 rounded-xl border border-outline-variant flex justify-between items-center active:bg-surface-container-low transition-colors">
<div class="flex-grow">
<p class="text-body-lg font-body-lg text-on-surface mb-1 italic">"A friend in need is a friend indeed."</p>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-primary-fixed text-on-primary-fixed-variant rounded-full text-label-md">95分</span>
<span class="text-label-md text-on-surface-variant">发音饱满，语调自然</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary-container rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
</button>
</div>
<!-- Item 2 -->
<div class="bg-white p-4 rounded-xl border border-outline-variant flex justify-between items-center active:bg-surface-container-low transition-colors">
<div class="flex-grow">
<p class="text-body-lg font-body-lg text-on-surface mb-1 italic">"Practice makes perfect..."</p>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-primary-fixed text-on-primary-fixed-variant rounded-full text-label-md">89分</span>
<span class="text-label-md text-on-surface-variant">注意 'perfect' 的重音</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary-container rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
</button>
</div>
<!-- Item 3 -->
<div class="bg-white p-4 rounded-xl border border-outline-variant flex justify-between items-center active:bg-surface-container-low transition-colors">
<div class="flex-grow">
<p class="text-body-lg font-body-lg text-on-surface mb-1 italic">"Better late than never."</p>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-primary-fixed text-on-primary-fixed-variant rounded-full text-label-md">92分</span>
<span class="text-label-md text-on-surface-variant">连读处理得很棒</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary-container rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
</button>
</div>
<!-- Item 4 -->
<div class="bg-white p-4 rounded-xl border border-outline-variant flex justify-between items-center active:bg-surface-container-low transition-colors">
<div class="flex-grow">
<p class="text-body-lg font-body-lg text-on-surface mb-1 italic">"The early bird catches the worm."</p>
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-primary-fixed text-on-primary-fixed-variant rounded-full text-label-md">86分</span>
<span class="text-label-md text-on-surface-variant">词尾爆破音较弱</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary-container rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
</button>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest shadow-sm z-50 flex justify-around items-center px-container-padding py-4 pb-safe border-t border-outline-variant">
<div class="flex gap-4 w-full max-w-lg mx-auto">
<button class="flex-1 h-12 rounded-xl border-2 border-primary text-primary font-headline-md active:scale-95 transition-all">返回首页</button>
<button class="flex-1 h-12 rounded-xl bg-primary text-on-primary font-headline-md active:scale-95 transition-all shadow-md">下一组练习</button>
</div>
</footer>
</body></html>
