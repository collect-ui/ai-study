<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<title>AI 英语口语学习 - 跟读模式</title>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f7f9fc",
                        "outline-variant": "#c1c7d3",
                        "tertiary-container": "#a06900",
                        "secondary-fixed": "#6bfad8",
                        "background": "#f7f9fc",
                        "surface-container-highest": "#e0e3e6",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#291800",
                        "on-primary-fixed": "#001c39",
                        "secondary": "#006b58",
                        "outline": "#717783",
                        "surface-container-low": "#f2f4f7",
                        "surface-container-high": "#e6e8eb",
                        "primary": "#005da7",
                        "inverse-surface": "#2d3133",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d8dadd",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#414751",
                        "tertiary": "#7f5300",
                        "on-tertiary-fixed-variant": "#633f00",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#48ddbc",
                        "surface-variant": "#e0e3e6",
                        "tertiary-fixed": "#ffddb4",
                        "surface-container": "#eceef1",
                        "on-secondary-container": "#00705c",
                        "on-tertiary-container": "#fffbff",
                        "surface-tint": "#0060ac",
                        "surface": "#f7f9fc",
                        "on-primary-fixed-variant": "#004883",
                        "inverse-on-surface": "#eff1f4",
                        "on-secondary-fixed": "#002019",
                        "on-error": "#ffffff",
                        "primary-container": "#2976c7",
                        "primary-fixed": "#d4e3ff",
                        "tertiary-fixed-dim": "#ffb953",
                        "on-background": "#191c1e",
                        "secondary-container": "#67f7d5",
                        "primary-fixed-dim": "#a4c9ff",
                        "on-primary-container": "#fdfcff",
                        "error": "#ba1a1a",
                        "inverse-primary": "#a4c9ff",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "12px",
                        "2xl": "16px",
                        "3xl": "24px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "16px",
                        "container-padding": "20px",
                        "inline-gap": "12px",
                        "section-margin": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Be Vietnam Pro"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .mic-pulse-bg {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md antialiased selection:bg-primary-fixed">
<header class="bg-surface sticky top-0 z-40 flex justify-between items-center w-full px-container-padding h-16">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary text-[28px]">arrow_back</span>
</button>
<h1 class="text-headline-lg font-headline-lg text-primary">口语测评</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</header>
<main class="max-w-md mx-auto px-container-padding pb-48">
<!-- Progress Indicator -->
<div class="mt-4 mb-6">
<div class="flex justify-between items-center mb-2">
<span class="text-body-md text-on-surface-variant">单元练习进度</span>
<span class="text-body-md font-semibold text-primary">第 3/10 句</span>
</div>
<div class="h-2 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-secondary-container w-[30%] rounded-full"></div>
</div>
</div>
<!-- Reading Card -->
<section class="bg-surface-container-lowest rounded-3xl border border-outline-variant p-6 shadow-sm mb-stack-gap">
<div class="flex justify-between items-center mb-6">
<span class="bg-primary-fixed text-on-primary-fixed px-3 py-1 rounded-lg text-label-md font-medium">精选名言</span>
<button class="flex items-center gap-2 text-primary hover:bg-primary/5 px-3 py-2 rounded-xl transition-colors">
<span class="material-symbols-outlined text-[24px]">volume_up</span>
<span class="font-semibold">标准范读</span>
</button>
</div>
<div class="space-y-6">
<div class="flex flex-wrap items-baseline gap-x-2 gap-y-1">
<span class="text-display-lg text-secondary">A</span>
<span class="text-display-lg text-secondary">friend</span>
<span class="text-display-lg text-secondary">in</span>
<div class="relative inline-block">
<span class="text-display-lg text-error font-bold border-b-4 border-error/30">need</span>
</div>
<span class="text-display-lg text-secondary">is</span>
<span class="text-display-lg text-secondary">a</span>
<span class="text-display-lg text-secondary">friend</span>
<span class="text-display-lg text-secondary">indeed.</span>
</div>
<div class="pt-6 border-t border-surface-container">
<p class="text-headline-md text-on-surface-variant font-medium">患难见真情。</p>
</div>
</div>
</section>
<!-- Feedback Section -->
<section class="grid grid-cols-2 gap-4 mb-stack-gap">
<div class="bg-surface-container-low rounded-2xl p-5 flex flex-col items-center text-center">
<span class="text-label-md text-on-surface-variant font-medium mb-1 uppercase tracking-wider">本次得分</span>
<div class="text-display-lg font-bold text-secondary">95<span class="text-body-md ml-1 text-on-surface-variant font-normal">分</span></div>
</div>
<div class="bg-surface-container-low rounded-2xl p-5 flex flex-col items-center text-center">
<span class="text-label-md text-on-surface-variant font-medium mb-1 uppercase tracking-wider">评价反馈</span>
<div class="text-headline-md font-bold text-primary py-2">非常流利</div>
</div>
</section>
<!-- AI Suggestion Section -->
<section class="bg-primary/5 rounded-3xl p-6 border border-primary/10">
<div class="flex items-center gap-3 mb-4">
<div class="w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[20px]">auto_awesome</span>
</div>
<h3 class="font-headline-md text-primary">AI 学习建议</h3>
</div>
<p class="text-body-lg text-on-surface-variant leading-relaxed">
            你的整体语调非常好，但在单词 <span class="font-bold text-error">"need"</span> 的长元音 /iː/ 发音时略显短促。建议多听范读，并注意舌位的高度。
        </p>
</section>
</main>
<!-- Bottom Controls -->
<div class="fixed bottom-0 left-0 w-full z-50 px-container-padding pb-8 pt-4 bg-surface/90 backdrop-blur-xl rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.08)] border-t border-outline-variant/20">
<div class="flex flex-col items-center max-w-md mx-auto">
<p class="text-label-md font-medium text-on-surface-variant mb-6 tracking-widest uppercase">长按话筒 · 开始录音</p>
<div class="flex justify-between items-center w-full px-6">
<!-- Redo Button -->
<button class="flex flex-col items-center gap-2 text-on-surface-variant hover:text-primary transition-all active:scale-90">
<div class="w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">refresh</span>
</div>
<span class="text-label-md font-semibold">重录</span>
</button>
<!-- Main Mic Button -->
<div class="relative">
<div class="absolute -inset-6 mic-pulse-bg bg-secondary-container rounded-full blur-2xl"></div>
<button class="relative w-24 h-24 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center shadow-[0_12px_32px_rgba(103,247,213,0.5)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<!-- Next Button -->
<button class="flex flex-col items-center gap-2 text-on-surface-variant hover:text-primary transition-all active:scale-90">
<div class="w-12 h-12 rounded-full border border-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</div>
<span class="text-label-md font-semibold">下一题</span>
</button>
</div>
</div>
</div>
<!-- Desktop Side Nav -->
<nav class="hidden md:flex fixed top-0 right-0 h-screen w-20 bg-surface-container-lowest border-l border-outline-variant flex-col items-center py-8 gap-8 z-50">
<div class="flex flex-col items-center gap-1 text-on-surface-variant opacity-40">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px]">首页</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary bg-secondary-container/30 p-2 rounded-xl">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="text-[10px]">学习</span>
</div>
<div class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px]">复习</span>
</div>
<div class="mt-auto flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px]">我的</span>
</div>
</nav>
<div class="hidden">

</div>
</body></html>
