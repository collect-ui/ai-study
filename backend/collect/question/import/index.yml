service:
  - key: ai_pdf_text
    http: true
    module: question_pdf_text
    params:
      file_path:
        default: ""
      max_chars:
        type: int
        default: 240000
      ocr_enabled:
        type: bool
        default: true
      ocr_service_url:
        default: http://collect-ui.top:8014/transcribe
      ocr_provider:
        default: tencent
      ocr_max_pages:
        type: int
        default: 200
      ocr_image_dpi:
        type: int
        default: 180
      ocr_timeout_seconds:
        type: int
        default: 120

  - key: ai_parse
    http: true
    module: question_ai_parse
    params:
      parse_mode:
        default: chunked
      provider:
        default: codex
      model:
        default: ""
      api_key:
        default: ""
      base_url:
        default: ""
      raw_text:
        default: ""
      fixed_text:
        default: ""
      mock_response:
        default: ""
      enable_cache:
        type: bool
        default: false
      file_path:
        default: ""
      subject:
        default: english
      stage:
        default: junior
      grade:
        default: grade_7
      textbook_version:
        default: pep
      unit_id:
        default: ""
      unit_code:
        default: ""
      unit_name:
        default: ""
      question_type:
        default: single_choice
      question_category:
        default: normal
      difficulty:
        default: basic
      score:
        type: int
        default: 5
      max_chars:
        type: int
        default: 24000
      source_max_chars:
        type: int
        default: 120000
      ocr_enabled:
        type: bool
        default: true
      ocr_service_url:
        default: http://collect-ui.top:8014/transcribe
      ocr_provider:
        default: tencent
      ocr_max_pages:
        type: int
        default: 80
      ocr_image_dpi:
        type: int
        default: 180
      ocr_timeout_seconds:
        type: int
        default: 120
      chunk_chars:
        type: int
        default: 12000
      max_chunks:
        type: int
        default: 20
      concurrency:
        type: int
        default: 0

  - key: pdf_knowledge_import_one_click
    http: true
    module: question_pdf_knowledge_import
    params:
      file_path:
        default: ""
      subject:
        default: english
      stage:
        default: primary
      grade:
        default: grade_3
      textbook_version:
        default: pep
      auto_commit:
        type: bool
        default: true
      question_policy:
        default: draft
      max_chars:
        type: int
        default: 240000
      ocr_enabled:
        type: bool
        default: true
      ocr_service_url:
        default: http://collect-ui.top:8014/transcribe
      ocr_provider:
        default: tencent
      ocr_max_pages:
        type: int
        default: 200
      ocr_image_dpi:
        type: int
        default: 180
      ocr_timeout_seconds:
        type: int
        default: 120
      provider:
        default: codex
      model:
        default: ""

  - key: pdf_import_preview
    http: true
    module: question_pdf_knowledge_import
    params:
      file_path:
        default: ""
      subject:
        default: english
      stage:
        default: primary
      grade:
        default: grade_3
      textbook_version:
        default: pep
      auto_commit:
        type: bool
        default: false
      question_policy:
        default: knowledge_only
      max_chars:
        type: int
        default: 240000
      ocr_enabled:
        type: bool
        default: true
      ocr_service_url:
        default: http://collect-ui.top:8014/transcribe
      ocr_provider:
        default: tencent
      ocr_max_pages:
        type: int
        default: 200
      ocr_image_dpi:
        type: int
        default: 180
      ocr_timeout_seconds:
        type: int
        default: 120
      provider:
        default: codex
      model:
        default: ""

  - key: pdf_source_query
    http: true
    module: sql
    params:
      source_doc_id:
        default: ""
      import_batch_id:
        default: ""
      file_name:
        template: "{{ if .file_name }}%{{.file_name}}%{{end}}"
      subject:
        default: ""
      grade:
        default: ""
      textbook_version:
        default: ""
      fragment_type:
        default: ""
      page:
        type: int
        default: 1
      size:
        type: int
        default: 100
      start:
        template: "({{.page}}-1) * {{.size}}"
        exec: true
        type: int
    data_file: pdf_source_query.sql

  - key: pdf_snapshot_query
    http: true
    module: sql
    params:
      source_doc_id:
        default: ""
      file_name:
        template: "{{ if .file_name }}%{{.file_name}}%{{end}}"
      knowledge_id:
        default: ""
      question_id:
        default: ""
      content_id:
        default: ""
      page:
        type: int
        default: 1
      size:
        type: int
        default: 100
      start:
        template: "({{.page}}-1) * {{.size}}"
        exec: true
        type: int
    data_file: pdf_snapshot_query.sql

  - key: pdf_source_trace_query
    http: true
    module: sql
    params:
      source_doc_id:
        default: ""
      file_name:
        template: "{{ if .file_name }}%{{.file_name}}%{{end}}"
      entity_type:
        default: ""
      entity_id:
        default: ""
      field_name:
        default: ""
      match_status:
        default: ""
      page:
        type: int
        default: 1
      size:
        type: int
        default: 100
      start:
        template: "({{.page}}-1) * {{.size}}"
        exec: true
        type: int
    data_file: pdf_source_trace_query.sql

  - key: pdf_parse_issue_query
    http: true
    module: sql
    params:
      source_doc_id:
        default: ""
      file_name:
        template: "{{ if .file_name }}%{{.file_name}}%{{end}}"
      issue_type:
        default: ""
      severity:
        default: ""
      status:
        default: ""
      page:
        type: int
        default: 1
      size:
        type: int
        default: 100
      start:
        template: "({{.page}}-1) * {{.size}}"
        exec: true
        type: int
    data_file: pdf_parse_issue_query.sql

  - key: pdf_field_source_save
    http: true
    module: model_save
    table: question_source_field_rel
    params:
      field_rel_id:
        template: "{{uuid}}"
      source_doc_id:
        check:
          template: "{{must .source_doc_id}}"
          err_msg: source_doc_id不能为空
      source_page_id:
        default: ""
      source_block_id:
        default: ""
      source_fragment_id:
        default: ""
      entity_type:
        check:
          template: "{{must .entity_type}}"
          err_msg: entity_type不能为空
      entity_id:
        check:
          template: "{{must .entity_id}}"
          err_msg: entity_id不能为空
      field_name:
        check:
          template: "{{must .field_name}}"
          err_msg: field_name不能为空
      field_part_order:
        type: int
        default: 1
      extracted_value:
        default: ""
      normalized_value:
        default: ""
      raw_quote:
        check:
          template: "{{must .raw_quote}}"
          err_msg: raw_quote不能为空
      context_before:
        default: ""
      context_after:
        default: ""
      char_start:
        type: int
        default: 0
      char_end:
        type: int
        default: 0
      bbox_json:
        default: "{}"
      confidence:
        type: float
        default: 1
      match_status:
        default: matched
      review_status:
        default: pending
      create_time:
        template: "{{current_date_time}}"

  - key: ai_import_save
    http: true
    module: bulk_service
    params:
      rows:
        default: []
    batch:
      foreach: "[rows]"
      item: item
      loop_max: 1
      service:
        service: question.question_choice_save
      append_item_param: true
      save_field: save_result

  - key: import_batch_query
    http: true
    module: sql
    params:
      page:
        type: int
        default: 1
      size:
        type: int
        default: 20
      start:
        template: "({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      count:
        default: true
    data_file: import_batch_query.sql
    count_file: import_batch_query_count.sql
    pagination: pagination
    count: "[count]"

  - key: import_batch_save
    http: true
    module: model_save
    table: question_import_batch
    params:
      batch_id:
        template: "{{uuid}}"
      status:
        default: parsing
      total_count:
        type: int
        default: 0
      success_count:
        type: int
        default: 0
      fail_count:
        type: int
        default: 0
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"

  - key: import_batch_update
    http: true
    module: model_update
    table: question_import_batch
    params:
      batch_id:
        check:
          template: "{{must .batch_id}}"
          err_msg: batch_id不能为空
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"
    update_fields:
      - file_name
      - file_url
      - subject
      - stage
      - grade
      - textbook_version
      - status
      - total_count
      - success_count
      - fail_count
      - error_summary
      - modify_time
      - modify_user
    filter:
      batch_id: "[batch_id]"

  - key: import_row_query
    http: true
    module: sql
    params:
      batch_id:
        check:
          template: "{{must .batch_id}}"
          err_msg: batch_id不能为空
      page:
        type: int
        default: 1
      size:
        type: int
        default: 100
      start:
        template: "({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      count:
        default: true
    data_file: import_row_query.sql
    count_file: import_row_query_count.sql
    pagination: pagination
    count: "[count]"

  - key: import_row_save
    http: true
    module: model_save
    table: question_import_row
    params:
      row_id:
        template: "{{uuid}}"
      batch_id:
        check:
          template: "{{must .batch_id}}"
          err_msg: batch_id不能为空
      row_index:
        type: int
        default: 1
      raw_json:
        default: "{}"
      parsed_json:
        default: "{}"
      validate_status:
        default: pending
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
