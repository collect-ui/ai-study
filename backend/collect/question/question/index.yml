  - key: analysis_media_upload
    name: 上传题目解析音视频
    http: true
    module: empty
    params:
      type:
        default: question-analysis
      only_path:
        default: false
        type: bool
    handler_params:
      - key: to_local_file
        field: "{{get_key \"local_file_dir\"}}/{{.type}}/{{sub_str current_date_time 0 10}}/"
        save_field: fileData
      - key: param2result
        enable: "[only_path]"
        field: "[fileData.path]"
      - key: param2result
        enable: "{{ not .only_path }}"
        field: "[fileData]"

  - key: question_delete
    http: true
    module: model_update
    table: question_item
    params:
      question_id:
        check:
          template: "{{must .question_id}}"
          err_msg: question_id不能为空
      is_delete:
        default: "1"
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"
    update_fields:
      - is_delete
      - modify_time
      - modify_user
    filter:
      question_id: "[question_id]"

  - key: question_choice_delete
    http: true
    module: empty
    params:
      question_id:
        check:
          template: "{{must .question_id}}"
          err_msg: question_id不能为空
    handler_params:
      - key: service2field
        service:
          service: question.question_delete
          question_id: "[question_id]"
      - key: service2field
        service:
