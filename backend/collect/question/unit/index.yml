service:
  - key: unit_query
    http: true
    module: sql
    params:
      keyword:
        template: "{{ if .keyword }}%{{.keyword}}%{{end}}"
    data_file: unit_query.sql

  - key: unit_save
    http: true
    module: model_save
    table: question_unit
    params:
      unit_id:
        template: "{{uuid}}"
      subject:
        check:
          template: "{{must .subject}}"
          err_msg: 科目不能为空
      stage:
        check:
          template: "{{must .stage}}"
          err_msg: 学段不能为空
      grade:
        check:
          template: "{{must .grade}}"
          err_msg: 年级不能为空
      textbook_version:
        default: pep
      unit_code:
        check:
          template: "{{must .unit_code}}"
          err_msg: 单元编码不能为空
      unit_name:
        check:
          template: "{{must .unit_name}}"
          err_msg: 单元名称不能为空
      order_index:
        type: int
        default: 1
      status:
        default: enabled
      is_delete:
        default: "0"
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"

  - key: unit_update
    http: true
    module: model_update
    table: question_unit
    params:
      unit_id:
        check:
          template: "{{must .unit_id}}"
          err_msg: unit_id不能为空
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"
    update_fields:
      - subject
      - stage
      - grade
      - textbook_version
      - parent_id
      - unit_code
      - unit_name
      - order_index
      - status
      - modify_time
      - modify_user
    filter:
      unit_id: "[unit_id]"

  - key: unit_delete
    http: true
    module: model_delete
    table: question_unit
    params:
      unit_id_list:
        check:
          template: "{{must .unit_id_list}}"
          err_msg: 单元不能为空
    filter:
      unit_id__in: "[unit_id_list]"
