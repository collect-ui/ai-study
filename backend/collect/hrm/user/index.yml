service:
  - key: bulk_update_user
    module: bulk_upsert
    http: true
    params:
      user_list:
        check:
          template: "{{must .user_list}}"
          err_msg: 用户列表不能为空
      fields:
        default: ["*"]
    handler_params:
      - key: update_array
        foreach: "[user_list]"
        item: item
        fields:
          - field: password
            template: "{{ if .item.password }}{{md5 .item.password}}{{ end }}"
    table: user_account
    options: "[fields]"
    model_field: "[user_list]"
    ignore_fields:
      - password

  - key: bulk_create_user
    module: bulk_create
    http: true
    params:
      user_list:
        check:
          template: "{{must .user_list}}"
          err_msg: 用户列表不能为空
    handler_params:
      - key: update_array
        foreach: "[user_list]"
        item: item
        fields:
          - field: user_id
            template: "{{uuid}}"
          - field: password
            template: "{{ if .item.password }}{{md5 .item.password}}{{ end }}"
    table: user_account
    model_field: "[user_list]"

  - key: delete_user_by_user_id_list
    module: model_update
    http: true
    params:
      user_id_list:
        check:
          template: "{{or (must .user_id_list) (must .ids)}}"
          err_msg: 用户不能为空
      is_delete:
        default: "1"
    table: user_account
    update_fields:
      - is_delete
    handler_params:
      - key: field2array
        field: "[ids]"
        enable: "{{must .ids}}"
        save_field: user_id_list
    filter:
      user_id__in: "[user_id_list]"

  - key: update_user_by_user_id
    module: model_update
    http: true
    params:
      user_id:
        check:
          template: "{{must .user_id}}"
          err_msg: 用户ID不能为空
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      nick:
        check:
          template: "{{must .nick}}"
          err_msg: 昵称不能为空
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"
    update_fields:
      - username
      - nick
      - status
      - email
      - phone
      - work_code
      - sex
      - entry_date
      - leave_date
      - leave_reason
      - modify_time
      - modify_user
    handler_params:
      - key: service2field
        service:
          service: hrm.user_list
          exclude: "[user_id]"
          username: "[username]"
          count: false
        save_field: user_info
        template: "{{ if .user_info }}false{{ else }}true{{ end }}"
        err_msg: "用户名 {{.username}} 已经存在"
    table: user_account
    filter:
      user_id: "[user_id]"

  - key: update_user_by_username
    module: model_update
    http: true
    params:
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      password:
        template: "{{ if .password }}{{md5 .password}}{{ end }}"
    table: user_account
    filter:
      username: "[username]"

  - key: create_user
    module: model_save
    http: true
    params:
      password:
        template: "{{ if .password }}{{md5 .password}}{{ end }}"
        default: "123456"
      is_delete:
        default: "0"
      user_id:
        check:
          template: "{{must .user_id}}"
          err_msg: 用户ID不能为空
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      nick:
        check:
          template: "{{must .nick}}"
          err_msg: 昵称不能为空
      status:
        default: "normal"
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
      modify_time:
        template: "{{current_date_time}}"
    handler_params:
      - key: service2field
        service:
          service: hrm.user_list
          username: "[username]"
          count: false
        save_field: user_info
        template: "{{le (len .user_info) 0}}"
        err_msg: "用户名【{{.username}}】已经存在"
    table: user_account

  - key: user_list
    module: sql
    http: true
    params:
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      nick:
        default: ""
      page:
        type: int
        default: 1
      size:
        default: 100
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      to_obj:
        default: false
      count:
        default: true
      with_password:
        default: false
      user_list:
        default: []
    data_file: user_list.sql
    count_file: user_list_count.sql
    pagination: pagination
    count: "[count]"
    result_handler:
      - key: result2params
        fields:
          - to: "[user_list]"
      - key: field2array
        enable: "{{must .user_list}}"
        foreach: "[user_list]"
        fields:
          - field: "[roles]"
            save_field: role_id_list
      - key: param2result
        field: "[user_list]"
      - key: arr2obj
        enable: "[to_obj]"
